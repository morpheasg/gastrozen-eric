version: '3.8'

services:
  eric:
    build: .
    container_name: gastrozen-eric
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./eric_lib:/app/eric_lib:ro
      - ./certs:/app/certs
      - ./logs:/app/logs
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
